<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>FÉNIX</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet"><script>tailwind.config={theme:{extend:{colors:{fenix:{p:'#e62e00',s:'#ff6b00',a:'#ffcc00',n:'#1a1a1a',b:'#ffffff',g:'#f1f3f4'}}}},fontFamily:{sans:['Roboto','Arial','sans-serif']}}}</script><style>body{font-family:Roboto,Arial,sans-serif;height:100vh;margin:0;padding:0;background:#fff;display:flex;flex-direction:column;overflow:hidden}.top-bar{background:#f8f9fa;border-bottom:1px solid #ddd;padding:.6rem 1rem;display:flex;align-items:center;gap:.7rem}.top-bar button{width:2rem;height:2rem;border-radius:50%;border:none;background:transparent;color:#555;cursor:pointer;transition:.2s}.top-bar button:hover{background:#eee;color:#e62e00}.logo-wrap{display:flex;align-items:center;justify-content:center;gap:.4rem;margin:1.8rem 0}.logo-icon{font-size:2.6rem;background:linear-gradient(135deg,#e62e00,#ff6b00,#ffcc00);-webkit-background-clip:text;background-clip:text;color:transparent;animation:llama 1.3s infinite alternate}.logo-text{font-size:3rem;font-weight:700;letter-spacing:1.5px;background:linear-gradient(90deg,#e62e00,#ff6b00,#ffcc00);-webkit-background-clip:text;background-clip:text;color:transparent;animation:brillar 1.6s infinite alternate,flotar 2.2s infinite}@keyframes brillar{0%{filter:brightness(1) drop-shadow(0 0 3px rgba(230,46,0,.4)}100%{filter:brightness(1.5) drop-shadow(0 0 8px rgba(255,107,0,.7))}}@keyframes flotar{0%{transform:translateY(0)}100%{transform:translateY(-3px)}}@keyframes llama{0%{transform:scale(1) rotate(-4deg)}100%{transform:scale(1.15) rotate(4deg)}.search-bar{width:90%;max-width:620px;margin:0 auto;display:flex;align-items:center;border:1px solid #ddd;border-radius:2.5rem;padding:.75rem 1.2rem;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:.25s}.search-bar:focus-within{box-shadow:0 3px 12px rgba(230,46,0,.22);border-color:#ff6b00}.search-bar i{color:#ff6b00;margin-right:.6rem}.search-bar input{flex:1;border:none;outline:none;font-size:.95rem;color:#333}.markers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.9rem;width:92%;max-width:680px;margin:1.5rem auto}.marker-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;padding:.8rem;border-radius:.75rem;border:1px solid #e0e0e0;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.06);cursor:pointer;transition:.2s}.marker-btn:hover{transform:translateY(-2px);border-color:#ff6b00;box-shadow:0 4px 10px rgba(230,107,0,.15);color:#e62e00}.marker-btn i{font-size:1.15rem}.marker-btn span{font-size:.8rem}.add-btn{border-style:dashed;border-color:#aaa;color:#666}.menu-dots{position:relative}.menu-list{position:absolute;top:2.4rem;right:0;background:#fff;border:1px solid #ddd;border-radius:.5rem;box-shadow:0 3px 12px rgba(0,0,0,.12);min-width:160px;display:none;z-index:10}.menu-list.show{display:block}.menu-list button{width:100%;text-align:left;padding:.6rem 1rem;border:none;background:transparent;color:#333;cursor:pointer;transition:.2s}.menu-list button:hover{background:#f1f3f4;color:#e62e00}.iframe-area{flex:1;width:100%;display:none;border-top:1px solid #ddd}.iframe-area iframe{width:100%;height:100%;border:none}.alert{display:none;color:#e62e00;text-align:center;margin-top:.8rem;font-size:.9rem}.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:20}.modal.show{display:flex}.modal-box{background:#fff;padding:1.2rem;border-radius:.7rem;width:85%;max-width:320px}.modal-box input{width:100%;padding:.6rem;margin:.5rem 0;border:1px solid #ddd;border-radius:.4rem;outline:none}.modal-box input:focus{border-color:#ff6b00}.modal-btns{display:flex;justify-content:flex-end;gap:.6rem;margin-top:.8rem}.modal-btns button{padding:.5rem 1rem;border:none;border-radius:.35rem;cursor:pointer}.btn-ok{background:#e62e00;color:#fff}.btn-cancel{background:#eee;color:#333}</style></head><body><div class="top-bar"><button id="back"><i class="fa fa-arrow-left"></i></button><button id="fwd"><i class="fa fa-arrow-right"></i></button><button id="reload"><i class="fa fa-refresh"></i></button><button id="home"><i class="fa fa-home"></i></button><div style="flex:1"></div><button id="addMark"><i class="fa fa-star-o"></i></button><div class="menu-dots"><button id="menuBtn"><i class="fa fa-ellipsis-v"></i></button><div class="menu-list" id="menuList"><button id="newTab"><i class="fa fa-plus-square-o"></i> Nueva tab</button><button id="history"><i class="fa fa-history"></i> Historial</button><button id="settings"><i class="fa fa-cog"></i> Configuración</button><button id="clearData"><i class="fa fa-trash-o"></i> Borrar datos</button><button id="about"><i class="fa fa-info-circle"></i> Acerca de FÉNIX</button></div></div></div><div id="startScreen" class="flex flex-col items-center justify-center flex-1 overflow-y-auto py-4"><div class="logo-wrap"><i class="fa fa-fire logo-icon"></i><span class="logo-text">FÉNIX</span></div><div class="search-bar"><i class="fa fa-search"></i><input id="searchIn" type="text" placeholder="Buscar o escribir dirección web..."></div><div class="markers-grid" id="markersArea"><button class="marker-btn" data-url="https://es.wikipedia.org"><i class="fa fa-book"></span>Wikipedia</button><button class="marker-btn" data-url="https://www.facebook.com"><i class="fa fa-facebook-square"></span>Facebook</button><button class="marker-btn" data-url="https://www.tiktok.com"><i class="fa fa-music"></span>TikTok</button><button class="marker-btn" data-url="https://www.instagram.com"><i class="fa fa-instagram"></span>Instagram</button><button class="marker-btn" data-url="https://www.x.com"><i class="fa fa-twitter"></span>X / Twitter</button><button class="marker-btn" data-url="https://www.youtube.com"><i class="fa fa-play-circle"></span>YouTube</button><button class="marker-btn" data-url="https://www.google.com/maps"><i class="fa fa-map-marker"></span>Mapas</button><button class="marker-btn" data-url="https://www.rae.es"><i class="fa fa-language"></span>RAE</button><button class="marker-btn" data-url="https://www.elmundo.es"><i class="fa fa-newspaper-o"></span>El Mundo</button><button class="marker-btn" data-url="https://www.bbc.com/mundo"><i class="fa fa-globe"></span>BBC Noticias</button><button class="marker-btn" data-url="https://www.linkedin.com"><i class="fa fa-linkedin-square"></span>LinkedIn</button><button class="marker-btn add-btn" id="addNew"><i class="fa fa-plus"></span>Agregar</button></div><div id="alertBox" class="alert"></div></div><div class="iframe-area" id="navArea"><iframe id="pageView" src=""></iframe></div><div class="modal" id="addModal"><div class="modal-box"><h4>Añadir marcador</h4><input id="markName" placeholder="Nombre"><input id="markUrl" placeholder="URL (ej: https://sitio.com)"><div class="modal-btns"><button class="btn-cancel" id="cancelAdd">Cancelar</button><button class="btn-ok" id="saveAdd">Guardar</button></div></div></div><script>const $=id=>document.getElementById(id),g=(s,p=document)=>p.querySelector(s),ga=(s,p=document)=>p.querySelectorAll(s);const back=$('back'),fwd=$('fwd'),reload=$('reload'),home=$('home'),menuBtn=$('menuBtn'),menuList=$('menuList'),searchIn=$('searchIn'),markersArea=$('markersArea'),addMark=$('addMark'),addNew=$('addNew'),addModal=$('addModal'),markName=$('markName'),markUrl=$('markUrl'),cancelAdd=$('cancelAdd'),saveAdd=$('saveAdd'),startScreen=$('startScreen'),navArea=$('navArea'),pageView=$('pageView'),alertBox=$('alertBox'),menuItems=ga('.menu-list button'),markerBtns=ga('.marker-btn:not(.add-btn)');let markers=JSON.parse(localStorage.getItem('fenixMarks')||'[{"name":"Wikipedia","url":"https://es.wikipedia.org"},{"name":"Facebook","url":"https://www.facebook.com"},{"name":"TikTok","url":"https://www.tiktok.com"},{"name":"Instagram","url":"https://www.instagram.com"},{"name":"X / Twitter","url":"https://www.x.com"},{"name":"YouTube","url":"https://www.youtube.com"},{"name":"Mapas","url":"https://www.google.com/maps"},{"name":"RAE","url":"https://www.rae.es"},{"name":"El Mundo","url":"https://www.elmundo.es"},{"name":"BBC Noticias","url":"https://www.bbc.com/mundo"},{"name":"LinkedIn","url":"https://www.linkedin.com"}]');function renderMarkers(){markersArea.innerHTML='';markers.forEach((m,i)=>{const b=document.createElement('button');b.className='marker-btn';b.dataset.url=m.url;b.innerHTML=`<i class="fa fa-bookmark-o"></i><span>${m.name}</span><button class="remove" data-i="${i}" style="position:absolute;top:2px;right:2px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#eee;color:#666;font-size:11px;opacity:0;transition:.2s">&times;</button>`;markersArea.appendChild(b)});const addBtn=document.createElement('button');addBtn.className='marker-btn add-btn';addBtn.id='addNew';addBtn.innerHTML='<i class="fa fa-plus"></i><span>Agregar</span>';markersArea.appendChild(addBtn);ga('.marker-btn:not(.add-btn)').forEach(btn=>{btn.addEventListener('click',e=>{if(e.target.classList.contains('remove')){const idx=parseInt(e.target.dataset.i);markers.splice(idx,1);saveMarkers();renderMarkers();return}navegar(btn.dataset.url)})});g('#addNew').addEventListener('click',()=>addModal.classList.add('show'));ga('.remove').forEach(r=>{r.addEventListener('click',e=>{e.stopPropagation();const idx=parseInt(e.target.dataset.i);markers.splice(idx,1);saveMarkers();renderMarkers()})})}function saveMarkers(){localStorage.setItem('fenixMarks',JSON.stringify(markers))}function ajustarUrl(u){u=u.trim();if(!u)return'';if(!/^https?:\/\//i.test(u)){if(/\./.test(u))return'https://'+u;else return'https://www.google.com/search?q='+encodeURIComponent(u)}return u}function navegar(url){const destino=url?ajustarUrl(url):ajustarUrl(searchIn.value);if(!destino){alertBox.textContent='⚠️ Escribe una dirección válida';alertBox.style.display='block';return}alertBox.style.display='none';pageView.src=destino;startScreen.style.display='none';navArea.style.display='flex'}function volverInicio(){pageView.src='';navArea.style.display='none';startScreen.style.display='flex';alertBox.style.display='none'}menuBtn.addEventListener('click',e=>{e.stopPropagation();menuList.classList.toggle('show')});document.addEventListener('click',()=>menuList.classList.remove('show'));searchIn.addEventListener('keydown',e=>e.key==='Enter'&&navegar());back.addEventListener('click',()=>history.back());fwd.addEventListener('click',()=>history.forward());reload.addEventListener('click',()=>{if(pageView.src)pageView.src=pageView.src});home.addEventListener('click',volverInicio);addMark.addEventListener('click',()=>addModal.classList.add('show'));cancelAdd.addEventListener('click',()=>addModal.classList.remove('show'));saveAdd.addEventListener('click',()=>{const n=markName.value.trim(),u=ajustarUrl(markUrl.value.trim());if(n&&u){markers.push({name:n,url:u});saveMarkers();renderMarkers();addModal.classList.remove('show');markName.value='';markUrl.value=''}else{alertBox.textContent='⚠️ Completa nombre y URL';alertBox.style.display='block'}});pageView.addEventListener('error',()=>{alertBox.textContent='⚠️ Esta página no se puede mostrar aquí';alertBox.style.display='block';startScreen.style.display='flex';navArea.style.display='none'});menuItems.forEach(btn=>{btn.addEventListener('click',()=>{menuList.classList.remove('show');const accion=btn.textContent.trim();if(accion==='Nueva tab')volverInicio();if(accion==='Acerca de FÉNIX')alert('FÉNIX Navegador • Versión 1.0');if(accion==='Borrar datos'){if(confirm('¿Borrar marcadores y datos?')){localStorage.removeItem('fenixMarks');markers=[];renderMarkers()}}})});renderMarkers();</script></body></html>
