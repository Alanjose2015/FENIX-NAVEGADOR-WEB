<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>FÉNIX</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet"><script>tailwind.config={theme:{extend:{colors:{fenix:{p:'#e62e00',s:'#ff6b00',a:'#ffcc00',n:'#1a1a1a',b:'#ffffff',g:'#f8f9fa'}}}},fontFamily:{sans:['Roboto','Arial','sans-serif']}}}</script><style>body{font-family:Roboto,Arial,sans-serif;height:100vh;margin:0;padding:0;background:#fff;display:flex;flex-direction:column;overflow:hidden}.barra-sup{background:#f8f9fa;border-bottom:1px solid #ddd;padding:.6rem 1rem;display:flex;align-items:center;gap:.8rem;position:relative}.barra-sup button{width:2rem;height:2rem;border-radius:50%;border:none;background:transparent;color:#555;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}.barra-sup button:hover{background:#eee;color:#e62e00}.contenido{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}.marca{display:flex;align-items:center;gap:.5rem;margin-bottom:1.5rem}.ico-fuego{font-size:2.8rem;background:linear-gradient(135deg,#e62e00,#ff6b00,#ffcc00);-webkit-background-clip:text;background-clip:text;color:transparent;animation:llama 1.3s infinite alternate}.txt-fenix{font-size:3rem;font-weight:700;letter-spacing:1.5px;background:linear-gradient(90deg,#e62e00,#ff6b00,#ffcc00);-webkit-background-clip:text;background-clip:text;color:transparent;animation:brillar 1.6s infinite alternate,flotar 2.2s infinite}@keyframes brillar{0%{filter:brightness(1) drop-shadow(0 0 3px rgba(230,46,0,.4)}100%{filter:brightness(1.5) drop-shadow(0 0 8px rgba(255,107,0,.7))}}@keyframes flotar{0%{transform:translateY(0)}100%{transform:translateY(-3px)}}@keyframes llama{0%{transform:scale(1) rotate(-4deg)}100%{transform:scale(1.15) rotate(4deg)}.buscador{width:92%;max-width:620px;display:flex;align-items:center;border:1px solid #ddd;border-radius:2.5rem;padding:.75rem 1.2rem;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:.25s}.buscador:focus-within{box-shadow:0 3px 12px rgba(230,46,0,.22);border-color:#ff6b00}.buscador i{color:#ff6b00;margin-right:.6rem}.buscador input{flex:1;border:none;outline:none;font-size:.95rem;color:#333}.marcadores{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.9rem;width:92%;max-width:650px;margin:1.5rem auto}.marcador{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;padding:.8rem;border-radius:.8rem;border:1px solid #e5e5e5;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.05);cursor:pointer;transition:.2s;position:relative}.marcador:hover{transform:translateY(-2px);border-color:#ff6b00;box-shadow:0 4px 10px rgba(230,107,0,.15);color:#e62e00}.marcador i{font-size:1.2rem}.marcador span{font-size:.8rem;text-align:center}.btn-agregar{border-style:dashed;border-color:#aaa;color:#666}.menu-puntos{position:relative}.menu-desp{position:absolute;top:2.4rem;right:.5rem;background:#fff;border:1px solid #ddd;border-radius:.5rem;box-shadow:0 3px 12px rgba(0,0,0,.15);min-width:170px;display:none;z-index:20}.menu-desp.mostrar{display:block}.menu-desp button{width:100%;text-align:left;padding:.65rem 1rem;border:none;background:transparent;color:#333;cursor:pointer;transition:.2s;justify-content:flex-start;gap:.5rem}.menu-desp button:hover{background:#f1f3f4;color:#e62e00}.zona-navegacion{flex:1;width:100%;display:none;border-top:1px solid #ddd}.zona-navegacion iframe{width:100%;height:100%;border:none}.aviso{display:none;color:#e62e00;text-align:center;margin-top:.8rem;font-size:.9rem}.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:30}.modal.mostrar{display:flex}.modal-caja{background:#fff;padding:1.2rem;border-radius:.7rem;width:85%;max-width:300px}.modal-caja input{width:100%;padding:.6rem;margin:.5rem 0;border:1px solid #ddd;border-radius:.4rem;outline:none}.modal-caja input:focus{border-color:#ff6b00}.modal-botones{display:flex;justify-content:flex-end;gap:.6rem;margin-top:.8rem}.modal-botones button{padding:.5rem 1rem;border:none;border-radius:.35rem;cursor:pointer}.btn-ok{background:#e62e00;color:#fff}.btn-cancel{background:#eee;color:#333}.btn-quitar{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:#eee;color:#666;font-size:11px;display:none;align-items:center;justify-content:center;border:none}.marcador:hover .btn-quitar{display:flex}</style></head><body><div class="barra-sup"><button id="atras"><i class="fa fa-arrow-left"></i></button><button id="adelante"><i class="fa fa-arrow-right"></i></button><button id="recargar"><i class="fa fa-refresh"></i></button><button id="inicio"><i class="fa fa-home"></i></button><div style="flex:1"></div><button id="marcador-rapido"><i class="fa fa-star-o"></i></button><div class="menu-puntos"><button id="btn-menu"><i class="fa fa-ellipsis-v"></i></button><div class="menu-desp" id="menu-desp"><button><i class="fa fa-plus-square-o"></i>Nueva pestaña</button><button><i class="fa fa-history"></i>Historial</button><button><i class="fa fa-cog"></i>Configuración</button><button id="borrar-datos"><i class="fa fa-trash-o"></i>Borrar marcadores</button><button id="acerca"><i class="fa fa-info-circle"></i>Acerca de FÉNIX</button></div></div></div><div id="pantalla-inicio" class="contenido"><div class="marca"><i class="fa fa-fire ico-fuego"></i><span class="txt-fenix">FÉNIX</span></div><div class="buscador"><i class="fa fa-search"></i><input id="entrada-busqueda" type="text" placeholder="Buscar o escribir dirección web..."></div><div class="marcadores" id="contenedor-marcadores"></div><div id="aviso" class="aviso"></div></div><div class="zona-navegacion" id="zona-navegacion"><iframe id="vista-pagina" src=""></iframe></div><div class="modal" id="modal-agregar"><div class="modal-caja"><h4>Agregar marcador</h4><input id="nom-marcador" placeholder="Nombre del sitio"><input id="url-marcador" placeholder="Ej: https://facebook.com"><div class="modal-botones"><button class="btn-cancel" id="btn-cancelar">Cancelar</button><button class="btn-ok" id="btn-guardar">Guardar</button></div></div></div><script>const $=id=>document.getElementById(id),g=s=>document.querySelector(s),ga=s=>document.querySelectorAll(s);const atras=$('atras'),adelante=$('adelante'),recargar=$('recargar'),inicio=$('inicio'),btn-menu=$('btn-menu'),menu-desp=$('menu-desp'),entrada=$('entrada-busqueda'),contenedorM=$('contenedor-marcadores'),marcadorRapido=$('marcador-rapido'),modal=$('modal-agregar'),nomM=$('nom-marcador'),urlM=$('url-marcador'),cancelar=$('btn-cancelar'),guardar=$('btn-guardar'),pantallaI=$('pantalla-inicio'),zonaNav=$('zona-navegacion'),vista=$('vista-pagina'),aviso=$('aviso'),borrarDatos=$('borrar-datos'),acerca=$('acerca');let marcadores=JSON.parse(localStorage.getItem('fenixMarcadores')||'[{"nombre":"Wikipedia","url":"https://es.wikipedia.org"},{"nombre":"Facebook","url":"https://www.facebook.com"},{"nombre":"TikTok","url":"https://www.tiktok.com"},{"nombre":"Instagram","url":"https://www.instagram.com"},{"nombre":"X / Twitter","url":"https://www.x.com"},{"nombre":"YouTube","url":"https://www.youtube.com"},{"nombre":"Mapas","url":"https://www.google.com/maps"},{"nombre":"RAE","url":"https://www.rae.es"},{"nombre":"BBC Noticias","url":"https://www.bbc.com/mundo"},{"nombre":"LinkedIn","url":"https://www.linkedin.com"}]');function guardarMarcadores(){localStorage.setItem('fenixMarcadores',JSON.stringify(marcadores))}function dibujarMarcadores(){contenedorM.innerHTML='';marcadores.forEach((m,i)=>{const b=document.createElement('div');b.className='marcador';b.dataset.url=m.url;b.innerHTML=`<i class="fa fa-bookmark"></i><span>${m.nombre}</span><button class="btn-quitar" data-indice="${i}">&times;</button>`;contenedorM.appendChild(b)});const agregar=document.createElement('div');agregar.className='marcador btn-agregar';agregar.id='btn-agregar-nuevo';agregar.innerHTML='<i class="fa fa-plus"></i><span>Agregar</span>';contenedorM.appendChild(agregar);g('#btn-agregar-nuevo').addEventListener('click',()=>modal.classList.add('mostrar'));ga('.marcador:not(.btn-agregar)').forEach(m=>{m.addEventListener('click',e=>{if(e.target.classList.contains('btn-quitar')){const idx=parseInt(e.target.dataset.indice);marcadores.splice(idx,1);guardarMarcadores();dibujarMarcadores();return}navegar(m.dataset.url)})});ga('.btn-quitar').forEach(x=>x.addEventListener('click',e=>{e.stopPropagation();const idx=parseInt(e.target.dataset.indice);marcadores.splice(idx,1);guardarMarcadores();dibujarMarcadores()}))}function corregirUrl(u){u=u.trim();if(!u)return'';if(!/^https?:\/\//i.test(u)){if(/\./.test(u))return'https://'+u;else return'https://www.google.com/search?q='+encodeURIComponent(u)}return u}function navegar(dest){const d=dest?corregirUrl(dest):corregirUrl(entrada.value);if(!d){aviso.textContent='⚠️ Escribe una dirección válida';aviso.style.display='block';return}aviso.style.display='none';vista.src=d;pantallaI.style.display='none';zonaNav.style.display='flex'}function volverInicio(){vista.src='';zonaNav.style.display='none';pantallaI.style.display='flex';aviso.style.display='none'}btn-menu.addEventListener('click',e=>{e.stopPropagation();menu-desp.classList.toggle('mostrar')});document.addEventListener('click',()=>menu-desp.classList.remove('mostrar'));entrada.addEventListener('keydown',e=>e.key==='Enter'&&navegar());atras.addEventListener('click',()=>history.back());adelante.addEventListener('click',()=>history.forward());recargar.addEventListener('click',()=>{if(vista.src)vista.src=vista.src});inicio.addEventListener('click',volverInicio);marcadorRapido.addEventListener('click',()=>modal.classList.add('mostrar'));cancelar.addEventListener('click',()=>modal.classList.remove('mostrar'));guardar.addEventListener('click',()=>{const n=nomM.value.trim(),u=corregirUrl(urlM.value.trim());if(n&&u){marcadores.push({nombre:n,url:u});guardarMarcadores();dibujarMarcadores();modal.classList.remove('mostrar');nomM.value='';urlM.value=''}else{aviso.textContent='⚠️ Completa nombre y dirección';aviso.style.display='block'}});vista.addEventListener('error',()=>{aviso.textContent='⚠️ Esta página no se puede mostrar aquí';aviso.style.display='block';volverInicio()});borrarDatos.addEventListener('click',()=>{if(confirm('¿Eliminar todos los marcadores?')){marcadores=[];guardarMarcadores();dibujarMarcadores()}});acerca.addEventListener('click',()=>alert('FÉNIX Navegador • Versión 1.0 • Diseño y funciones completas'));dibujarMarcadores();</script></body></html>
